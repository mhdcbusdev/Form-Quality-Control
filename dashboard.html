<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Kepuasan Pasien — MHDC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--surface:#fff;--ink:#16202b;--muted:#67788a;--line:#e6ebf0;--brand:#e23744;--teal:#1ca7a0;--blue:#2f6fed;--good:#1f9d57;--warn:#e08600;--bad:#d6453f;--font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.layout{display:flex;min-height:100vh}
.sidebar{width:260px;flex:none;background:var(--surface);border-right:1px solid var(--line);padding:22px 18px;display:flex;flex-direction:column;gap:22px}
.brand{display:flex;align-items:center;justify-content:center;padding-bottom:18px;border-bottom:1px solid var(--line)}
.brand-logo{width:100%;max-width:220px;height:auto;object-fit:contain}
.nav-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.nav-group{display:flex;flex-direction:column;gap:10px}
.f{display:flex;flex-direction:column;gap:6px}
.f label{font-size:12.5px;font-weight:600;color:#41525f}
.f input,.f select{padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:var(--font);background:#fff;color:var(--ink);width:100%}
.f input:focus,.f select:focus{outline:2px solid var(--blue);border-color:transparent}
.sidebar-foot{margin-top:auto}
.count-badge{display:block;background:#eef2f7;color:#3d4f61;padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;text-decoration:none;cursor:pointer;transition:background .15s,color .15s}
.count-badge:hover{background:#1f6fb8;color:#fff}
.count-badge::after{content:" ↗";font-size:11px}
.content{flex:1;padding:26px 30px 50px;min-width:0}
.content>h2{font-size:19px;font-weight:700;margin:0 0 4px}
.content>.sub{font-size:13px;color:var(--muted);margin:0 0 24px}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 2px 12px}
.top-row{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:26px}
.hl{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:0 1px 3px rgba(20,40,60,.04)}
.hl-label{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px}
.hl-value{font-size:42px;font-weight:800;line-height:1;letter-spacing:-.02em}
.hl-sub{font-size:13px;color:var(--muted);margin-top:10px}
.pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;margin-top:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(20,40,60,.04);border-top:3px solid var(--accent,var(--blue))}
.m-label{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:12px;min-height:34px;line-height:1.3}
.m-figure{display:flex;align-items:baseline;gap:4px}
.m-value{font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em}
.m-max{font-size:14px;font-weight:600;color:var(--muted)}
.bar{height:6px;border-radius:999px;background:#eef2f7;margin-top:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:var(--accent,var(--blue));transition:width .5s ease}
.m-status{font-size:12px;font-weight:700;margin-top:10px}
.st-good{color:var(--good)}.st-warn{color:var(--warn)}.st-bad{color:var(--bad)}
.pill-good{background:#e6f6ec;color:var(--good)}.pill-warn{background:#fdf0db;color:var(--warn)}.pill-bad{background:#fbe7e6;color:var(--bad)}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:40px}
@media(min-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.layout{flex-direction:column}.sidebar{width:auto;border-right:none;border-bottom:1px solid var(--line)}.content{padding:20px 18px 40px}.top-row{grid-template-columns:1fr}}
</style>
</head>

  <main class="content">
    <h2>Ringkasan Kepuasan Pasien</h2>
    <p class="sub">Data dari kuesioner pasien · diperbarui otomatis</p>
    <div class="top-row" id="topRow"></div>

    <p class="sec-title" style="margin-top:28px">Rincian Survei Kepuasan Masyarakat (INM Kemenkes)</p>
    <div class="grid" id="skmDetail"></div>

</div>
<script>
/* ====== EDIT DI SINI: tempel URL Apps Script Anda (.../exec) ====== */
var API_URL = "https://script.google.com/macros/s/AKfycby2HRNNZBjKg_ekXIlc-pmbmFfySXr-BbNg6-NNBQSdvdxYWOUp_7sM5X0TVx94S9ZLcA/exec";
var ACCESS_KEY = "hZ5ghVCe4EpgHgnuK_TDOpbU";

/* Daftar cabang — sesuaikan */
var BRANCHES=["Medikids Batam","Medikids Bekasi","Medikids Bintaro","Medikids Bogor","Medikids BSD","Medikids Cibinong","Medikids Cibubur","Medikids Cikarang","Medikids Cikupa","Medikids Cilegon","Medikids Cipondoh Tangerang","Medikids Cirebon","Medikids Dago Bandung","Medikids Depok","Medikids Grand Wisata","Medikids Green Terrace","Medikids JGC","Medikids Kalimalang","Medikids Karawaci","Medikids Karawang","Medikids Kebon Jeruk","Medikids Kemang","Medikids Lebak Bulus","Medikids Makassar","Medikids Malang","Medikids Padang","Medikids Palembang","Medikids Pancoran Mas","Medikids Pekanbaru","Medikids Pondok Indah","Medikids Rawamangun","Medikids Rempoa","Medikids Sawangan","Medikids Semarang","Medikids Serpong","Medikids Solo","Medikids Sunter","Medikids Surabaya","MHDC Bulog","MHDC Kalibata","MHDC Sentraya","MHDC Wisma BNI 46"];
var THRESH = { npsPromoterMin:5, npsDetractorMax:3, complaintScoreMax:2 };
var CLEAN_SCORE = {"Sangat Bersih":5,"Bersih":3.75,"Cukup Bersih":2.5,"Perlu Perbaikan":1.25};
/* Pertanyaan SKM yang aktif (harus cocok dgn form). Skala 1-4. */
var SKM_ITEMS=[
  {id:"U1",label:"Alur pendaftaran & pelayanan"},
  {id:"U3",label:"Kecepatan waktu pelayanan"},
  {id:"U4",label:"Biaya pelayanan"},
  {id:"U9",label:"Penanganan pengaduan"}
];

var $ = function(s){return document.querySelector(s)};
var ALL=[];
function num(v){return (v===""||v==null)?null:Number(v)}
/* Ambil nilai field dari salah satu nama kolom yang mungkin (teknis atau label Indonesia) */
function pick(r,keys){for(var i=0;i<keys.length;i++){if(r[keys[i]]!==undefined&&r[keys[i]]!==null&&r[keys[i]]!=="")return r[keys[i]];}return null;}
var COL={
  branch:["branch","Cabang"],
  timestamp:["timestamp","Waktu"],
  Dokter:["Dokter"],
  Perawat:["Perawat"],
  FrontOffice:["FrontOffice","Front Office"],
  nps:["nps","NPS (1-5)","NPS"],
  kebersihan:["kebersihan","Kebersihan"],
  keluhan:["keluhan","Ada Keluhan?","Ada Keluhan"],
};
function avg(a){return a.length?a.reduce(function(x,y){return x+y},0)/a.length:0}
function fmt(n){return (!n||isNaN(n))?"–":n.toFixed(2)}
function avgField(rows,keys){var v=rows.map(function(r){return num(pick(r,keys))}).filter(function(x){return x!=null&&!isNaN(x)&&x>0});return avg(v)}
function applyFilters(rows,f){return rows.filter(function(r){
  if(f.branch&&f.branch!=="ALL"&&pick(r,COL.branch)!==f.branch)return false;
  var ts=pick(r,COL.timestamp);var t=ts?new Date(ts):null;
  if(f.from&&t&&t<new Date(f.from))return false;
  if(f.to&&t&&t>new Date(f.to+"T23:59:59"))return false;
  return true;
})}
function unitAverages(rows){return {Dokter:avgField(rows,COL.Dokter),Perawat:avgField(rows,COL.Perawat),FrontOffice:avgField(rows,COL.FrontOffice)}}
function cleanAvg(rows){var v=rows.map(function(r){return CLEAN_SCORE[pick(r,COL.kebersihan)]}).filter(function(x){return x!=null});return avg(v)}
function csat(rows){var per=rows.map(function(r){var v=[num(pick(r,COL.Dokter)),num(pick(r,COL.Perawat)),num(pick(r,COL.FrontOffice))].filter(function(x){return x!=null&&x>0});return v.length?avg(v):null}).filter(function(x){return x!=null});return avg(per)}
function nps(rows){var v=rows.map(function(r){return num(pick(r,COL.nps))}).filter(function(x){return x!=null&&x>0});if(!v.length)return{score:0,promoter:0,passive:0,detractor:0,n:0};var p=v.filter(function(x){return x>=THRESH.npsPromoterMin}).length;var d=v.filter(function(x){return x<=THRESH.npsDetractorMax}).length;return{score:Math.round((p-d)/v.length*100),promoter:p,passive:v.length-p-d,detractor:d,n:v.length}}
function npsAvg(rows){var v=rows.map(function(r){return num(pick(r,COL.nps))}).filter(function(x){return x!=null&&x>0});return avg(v)}
function skmItemAvg(rows,id){var v=rows.map(function(r){return num(r[id])}).filter(function(x){return x!=null&&!isNaN(x)&&x>0});return avg(v)}
function skmOverall(rows){var all=[];rows.forEach(function(r){SKM_ITEMS.forEach(function(it){var x=num(r[it.id]);if(x!=null&&!isNaN(x)&&x>0)all.push(x);})});return avg(all)}
function complaintRatio(rows){if(!rows.length)return 0;var c=rows.filter(function(r){
  if(String(pick(r,COL.keluhan)).toLowerCase()==="ya")return true;
  return [COL.Dokter,COL.Perawat,COL.FrontOffice].some(function(k){var x=num(pick(r,k));return x!=null&&x>0&&x<=THRESH.complaintScoreMax});
}).length;return c/rows.length*100}
function statusOf(val,max){if(!val||isNaN(val))return{txt:"Belum ada data",cls:"st-warn"};var r=val/max;if(r>=0.8)return{txt:"Baik",cls:"st-good"};if(r>=0.6)return{txt:"Cukup",cls:"st-warn"};return{txt:"Perlu perhatian",cls:"st-bad"}}

function initFilters(){
  $("#fBranch").innerHTML='<option value="ALL">Semua cabang</option>'+BRANCHES.map(function(b){return"<option>"+b+"</option>"}).join("");
  ["#fBranch","#fFrom","#fTo"].forEach(function(s){$(s).addEventListener("change",renderAll)});
}
function load(){
  fetch(API_URL+"?action=data&key="+encodeURIComponent(ACCESS_KEY)).then(function(r){return r.json()}).then(function(o){ALL=o.rows||[];renderAll()}).catch(function(){ALL=[];$("#status").textContent="Gagal memuat";renderAll()});
}
function metricCard(label,val,max,accent){
  var st=statusOf(val,max);var pct=val&&!isNaN(val)?Math.min(100,val/max*100):0;
  return '<div class="metric" style="--accent:'+accent+'"><div class="m-label">'+label+'</div><div class="m-figure"><span class="m-value">'+fmt(val)+'</span><span class="m-max">/ '+max+'</span></div><div class="bar"><div class="bar-fill" style="width:'+pct+'%"></div></div><div class="m-status '+st.cls+'">'+st.txt+'</div></div>';
}
function renderAll(){
  var rows=applyFilters(ALL,{branch:$("#fBranch").value,from:$("#fFrom").value,to:$("#fTo").value});
  $("#status").textContent=rows.length+" responden";
  if(!rows.length){$("#topRow").innerHTML='<div class="hl"><div class="empty">Belum ada data untuk filter ini.</div></div>';$("#cards").innerHTML="";$("#skmDetail").innerHTML="";return}
  var u=unitAverages(rows),na=npsAvg(rows),cr=complaintRatio(rows);
  var crPill=cr<=10?"pill-good":cr<=25?"pill-warn":"pill-bad";var crTxt=cr<=10?"Terkendali":cr<=25?"Perlu dipantau":"Tinggi";
  var npsSt=statusOf(na,5);var npsPill=npsSt.cls==="st-good"?"pill-good":npsSt.cls==="st-warn"?"pill-warn":"pill-bad";
  $("#topRow").innerHTML='<div class="hl" style="border-top:3px solid var(--warn)"><div class="hl-label">Complain Ratio</div><div class="hl-value">'+cr.toFixed(1)+'%</div><span class="pill '+crPill+'">'+crTxt+'</span><div class="hl-sub">Persentase responden yang menyatakan keluhan</div></div><div class="hl" style="border-top:3px solid var(--brand)"><div class="hl-label">Rata-rata Rekomendasi (NPS)</div><div class="hl-value">'+fmt(na)+'<span style="font-size:18px;font-weight:600;color:var(--muted)"> / 5</span></div><span class="pill '+npsPill+'">'+npsSt.txt+'</span><div class="hl-sub">Rata-rata skor rekomendasi dari responden</div></div>';
  $("#cards").innerHTML=[
    metricCard("Front Office",u.FrontOffice,5,"var(--brand)"),
    metricCard("Perawat (PRG)",u.Perawat,5,"var(--teal)"),
    metricCard("Dokter",u.Dokter,5,"var(--blue)"),
    metricCard("Kebersihan",cleanAvg(rows),5,"var(--good)"),
    metricCard("CSAT Klinik",csat(rows),5,"var(--warn)")
  ].join("");
  // Seksi SKM: rata-rata gabungan + rincian per pertanyaan
  $("#skmDetail").innerHTML=[metricCard("Rata-rata SKM (INM)",skmOverall(rows),4,"#7c5cbf")].concat(
    SKM_ITEMS.map(function(it){return metricCard(it.label,skmItemAvg(rows,it.id),4,"#7c5cbf");})
  ).join("");
}
initFilters();load();
</script>
